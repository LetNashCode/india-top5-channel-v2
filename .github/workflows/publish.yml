name: Publish Short

on:
  schedule:
    - cron: "0 2 * * *"      # 07:30 IST
    - cron: "30 4 * * *"     # 10:00 IST
    - cron: "30 7 * * *"     # 13:00 IST
    - cron: "30 10 * * *"    # 16:00 IST
    - cron: "30 13 * * *"    # 19:00 IST
    - cron: "30 15 * * *"    # 21:00 IST

  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install ImageMagick (needed for captions)
        run: |
          sudo apt-get install -y imagemagick
          sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/' /etc/ImageMagick-6/policy.xml
          which convert && convert --version      

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Write credential files from secrets
        run: |
          echo '${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}' > client_secret.json

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: python main.py

      - name: Commit updated used_topics.json
        run: |
          git config user.name "auto-publish-bot"
          git config user.email "actions@github.com"
          git add used_topics.json
          git diff --cached --quiet || git commit -m "Update used topics [skip ci]"
          git push
